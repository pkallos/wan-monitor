version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Effect ecosystem - ignore major versions
      effect:
        patterns:
          - "effect"
          - "@effect/*"
        update-types:
          - "minor"
          - "patch"

      # React ecosystem - ignore major versions
      react:
        patterns:
          - "react"
          - "react-dom"
        update-types:
          - "minor"
          - "patch"

      # Chakra UI and emotion - group together, ignore major versions
      chakra-ui:
        patterns:
          - "@chakra-ui/*"
          - "@emotion/*"
          - "framer-motion"
        update-types:
          - "minor"
          - "patch"

      # Testing libraries - ignore major versions
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
        update-types:
          - "minor"
          - "patch"

      # Build tools - ignore Vite major versions
      build-tools:
        patterns:
          - "vite"
          - "tsup"
          - "tsx"
          - "@vitejs/*"
        update-types:
          - "minor"
          - "patch"

      # Backend framework - ignore Fastify major versions
      backend:
        patterns:
          - "fastify"
          - "@fastify/*"
        update-types:
          - "minor"
          - "patch"

      # Database clients
      database:
        patterns:
          - "pg"
          - "@types/pg"
          - "@questdb/*"

      # Development tools
      dev-tools:
        patterns:
          - "@biomejs/*"
          - "husky"
          - "lint-staged"
          - "turbo"
          - "pino"
          - "pino-pretty"

      # TypeScript and type definitions - ignore major versions
      # (@types/node major is pinned to match the project's Node version)
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"

      # Other utilities - ignore major versions (recharts v3 needs a manual migration)
      utilities:
        patterns:
          - "dotenv"
          - "react-icons"
          - "recharts"
          - "@tanstack/react-query"
          - "ping"
          - "@types/ping"
        update-types:
          - "minor"
          - "patch"

    # Ignore major version updates for packages that require significant refactoring
    ignore:
      # Effect ecosystem major versions
      - dependency-name: "effect"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@effect/platform"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@effect/platform-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@effect/schema"
        update-types: ["version-update:semver-major"]

      # React major versions
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

      # Build tools major versions
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

      # Backend major versions
      - dependency-name: "fastify"
        update-types: ["version-update:semver-major"]

      # TypeScript major versions (TS 6.0 needs a manual migration)
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

      # @types/node major is pinned to the project's Node runtime (Node 24)
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

      # Vite plugin major versions (tied to Vite major, which is also ignored)
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]

      # Chakra UI / emotion / framer-motion major versions (Chakra v3 is a full API rewrite)
      - dependency-name: "@chakra-ui/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@emotion/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "framer-motion"
        update-types: ["version-update:semver-major"]

      # Testing library major versions (vitest 4, testing-library 16, jsdom 27 need manual migration)
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@testing-library/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]

      # Charting library major versions (recharts v3 needs a manual migration)
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]

      # Pinned version due to patch
      - dependency-name: "speedtest-net"
        versions: [">2.2.0"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
