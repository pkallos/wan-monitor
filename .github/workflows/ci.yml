name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  # Dependency installation shared across jobs
  # pnpm cache is handled by actions/setup-node with cache: 'pnpm'
  # This caches the pnpm store (~/.pnpm-store) across runs

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run linter
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run typecheck
        run: pnpm typecheck

      - name: Typecheck e2e
        run: pnpm typecheck:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build all packages
        run: pnpm build

      # Runs the real built bundle and asserts it boots + serves
      # /api/health/live. Catches startup crashes (e.g. a CJS dep bundled into
      # ESM emitting a "Dynamic require" shim) that compile cleanly but would
      # crash-loop the container. No DB needed — /live is pure liveness.
      - name: Smoke test built backend
        run: pnpm smoke:server

  coverage:
    name: Tests (with Coverage)
    runs-on: ubuntu-latest

    services:
      questdb:
        image: questdb/questdb:9.2.3
        ports:
          - 9000:9000
          - 9009:9009
          - 8812:8812

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Wait for QuestDB
        run: |
          echo "Waiting for QuestDB to be ready..."
          for i in {1..60}; do
            if curl -sf "http://localhost:9000/exec?query=SELECT%201" > /dev/null 2>&1 && (echo > /dev/tcp/localhost/8812) > /dev/null 2>&1; then
              echo "QuestDB is ready (HTTP + PgWire)!"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
          echo "QuestDB failed to start"
          exit 1

      # Schema is bootstrapped by the QuestDB client on connect (see
      # questdb/bootstrap.ts) and by the integration-test setup, both from the
      # canonical definition in @wan-monitor/shared/db-schema. No manual
      # CREATE TABLE step is needed here.

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          DB_HOST: localhost
          QUESTDB_AVAILABLE: 'true'

      - name: Upload web coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 7

      - name: Upload server coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-server
          path: apps/server/coverage/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]

    services:
      questdb-test:
        image: questdb/questdb:9.2.3
        ports:
          - 9100:9000
          - 9109:9009
          - 8912:8812

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Servers run in dev mode (tsx/vite), so no build is needed here; the
      # `build` job (a dependency of this one) already gates buildability.
      # Playwright globalSetup waits for QuestDB and seeds it; globalSetup/teardown
      # skip container management when CI is set (the DB is a service container).
      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          E2E_DB_URL: http://localhost:9100

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Skip Docker build on draft PRs to save CI time
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    permissions:
      contents: read
      actions: write  # Required for BuildKit GHA cache

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Use Docker Buildx for better caching support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build with GitHub Actions cache
      # This caches Docker layers between runs for faster builds
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: wan-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
