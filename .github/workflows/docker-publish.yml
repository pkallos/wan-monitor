name: Publish Docker Image
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: "The git tag to build (e.g., wan-monitor-v0.6.2)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"
      - "wan-monitor-v*.*.*"
permissions:
  contents: read
  actions: write  # Required for BuildKit GHA cache
jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || '' }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linter
        run: pnpm lint
      - name: Check formatting
        run: pnpm format:check
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#wan-monitor-}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG"
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: phibit/wan-monitor
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=wan-monitor-docker
            type=registry,ref=phibit/wan-monitor:buildcache
          cache-to: |
            type=gha,scope=wan-monitor-docker,mode=max
            type=registry,ref=phibit/wan-monitor:buildcache,mode=max
